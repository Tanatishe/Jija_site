

services:
  site:
    build: .
    container_name: site
    networks:
    - simple_net

  nginx:
      image: nginx:latest
      container_name: nginx
      ports:
        - 80:80
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
      depends_on:
        - site
      networks:
        - simple_net

networks:
    simple_net:
      driver: bridge